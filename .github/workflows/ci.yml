# CI for churro-coder. One required check ("CI / Build & check") that you
# can wire into branch protection / a ruleset to gate PR merges into main.
#
# Builds all three apps (gateway / desktop / daemon) and runs lint + test
# for any project that exposes those Nx targets. Targets are plugin-inferred
# via @nx/dotnet (gateway) and @naxodev/gonx (daemon); desktop has only
# `build` today (typecheck is skipped — see apps/desktop/AGENTS.md).

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded PR runs; let main pushes finish so we don't lose signal.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Build & check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from the root package.json `packageManager` field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      # apps/landing's prebuild runs scripts/process-assets.py which uses PIL
      # to crop/round desktop screenshots before `next build`. Mirrors the
      # python3-pil install in apps/landing/Dockerfile.
      - name: Install Pillow (for landing prebuild)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends python3-pil

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/daemon/go.mod
          cache: false # daemon has no go.sum yet; setup-go cache would warn

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'apps/desktop/bun.lock', 'apps/landing/bun.lock', 'apps/gateway/Gateway.csproj', 'apps/daemon/go.mod') }}
          restore-keys: |
            nx-${{ runner.os }}-

      # apps/desktop is bun-managed (intentionally outside the pnpm workspace).
      # Cache its node_modules separately keyed on bun.lock so reinstalls only
      # happen when deps actually change. The postinstall runs electron-rebuild
      # which compiles better-sqlite3 / node-pty natively — that's the slow bit.
      - name: Cache desktop node_modules
        id: cache-desktop
        uses: actions/cache@v4
        with:
          path: apps/desktop/node_modules
          key: bun-desktop-${{ runner.os }}-${{ hashFiles('apps/desktop/bun.lock') }}

      # apps/landing is bun-managed too (also outside the pnpm workspace).
      - name: Cache landing node_modules
        id: cache-landing
        uses: actions/cache@v4
        with:
          path: apps/landing/node_modules
          key: bun-landing-${{ runner.os }}-${{ hashFiles('apps/landing/bun.lock') }}

      - name: Install root deps (pnpm)
        run: pnpm install --frozen-lockfile

      - name: Install desktop deps (bun)
        if: steps.cache-desktop.outputs.cache-hit != 'true'
        working-directory: apps/desktop
        env:
          SKIP_ELECTRON_REBUILD: "1"
        run: bun install --frozen-lockfile

      - name: Install landing deps (bun)
        if: steps.cache-landing.outputs.cache-hit != 'true'
        working-directory: apps/landing
        run: bun install --frozen-lockfile

      - name: Restore .NET deps
        run: pnpm exec nx run-many -t restore

      - name: Build (all projects)
        run: pnpm exec nx run-many -t build

      - name: Lint (all projects with a lint target)
        run: pnpm exec nx run-many -t lint

      - name: Test (all projects with a test target)
        run: pnpm exec nx run-many -t test
